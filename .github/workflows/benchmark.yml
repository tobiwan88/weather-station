name: Benchmark

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  VENV: /home/zephyr/.venv/bin/activate

defaults:
  run:
    shell: bash

jobs:
  footprint:
    name: ROM/RAM Footprint
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tobiwan88/zephyr_docker:arm
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Configure git user
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Bot"

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/../zephyr
            ${{ github.workspace }}/../modules
          key: west-${{ hashFiles('west.yml') }}
          restore-keys: west-

      - name: West init + update
        run: |
          source $VENV
          west init -l . 2>/dev/null || true
          west update --narrow

      - name: Apply out-of-tree patches
        run: |
          source $VENV
          west patch apply

      - name: Install build dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends pkgconf libsdl2-dev

      - name: Build ROM report
        run: |
          source $VENV
          WEST_ROOT=$(west topdir)
          ZEPHYR_EXTRA_MODULES="${WEST_ROOT}/weather-station" \
          ZEPHYR_BASE="${WEST_ROOT}/zephyr" \
            west build -p always -b frdm_mcxn947/mcxn947/cpu0 \
              --build-dir "${GITHUB_WORKSPACE}/build/bench" \
              "${WEST_ROOT}/weather-station/apps/gateway"
          # rom_report outputs tree to both stdout and stderr depending on env
          ZEPHYR_EXTRA_MODULES="${WEST_ROOT}/weather-station" \
          ZEPHYR_BASE="${WEST_ROOT}/zephyr" \
            west build --build-dir "${GITHUB_WORKSPACE}/build/bench" --target rom_report \
            >"${GITHUB_WORKSPACE}/rom_report.txt" 2>&1
          echo "ROM report lines: $(wc -l < "${GITHUB_WORKSPACE}/rom_report.txt")"

      - name: Build RAM report
        run: |
          source $VENV
          WEST_ROOT=$(west topdir)
          ZEPHYR_EXTRA_MODULES="${WEST_ROOT}/weather-station" \
          ZEPHYR_BASE="${WEST_ROOT}/zephyr" \
            west build --build-dir "${GITHUB_WORKSPACE}/build/bench" --target ram_report \
            >"${GITHUB_WORKSPACE}/ram_report.txt" 2>&1
          echo "RAM report lines: $(wc -l < "${GITHUB_WORKSPACE}/ram_report.txt")"

      - name: Parse reports
        run: |
          python3 scripts/parse_footprint.py \
            --rom "${GITHUB_WORKSPACE}/rom_report.txt" \
            --ram "${GITHUB_WORKSPACE}/ram_report.txt" \
            --label gateway-frdm-mcxn947 \
            -o "${GITHUB_WORKSPACE}/benchmark-data.json"

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Weather Station Footprint
          tool: customSmallerIsBetter
          output-file-path: benchmark-data.json
          auto-push: ${{ github.event_name == 'push' }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: "110%"
          comment-on-alert: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-alert: true
          summary-always: true

  docs:
    name: Build and Deploy Docs
    runs-on: ubuntu-latest
    steps:
      - id: changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'mkdocs.yml'
              - 'index.html'

      - if: steps.changes.outputs.docs == 'true'
        name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - if: steps.changes.outputs.docs == 'true'
        name: Configure git user
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI Bot"

      - if: steps.changes.outputs.docs == 'true'
        name: Install MkDocs and Material theme
        run: pip install mkdocs mkdocs-material

      - if: steps.changes.outputs.docs == 'true'
        name: Build MkDocs site
        run: mkdocs build

      - if: steps.changes.outputs.docs == 'true'
        name: Deploy to GitHub Pages
        run: |
          cp -r site/* .
          cp index.html .
          git add -A
          git diff --staged --exit-code || git commit -m "docs: update GitHub Pages $(date +'%Y-%m-%d %H:%M:%S')"
          git push
