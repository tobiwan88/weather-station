name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tobiwan88/zephyr_docker:latest
      options: --user zephyr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run pre-commit hooks
        run: |
          source ~/.venv/bin/activate
          pip install pre-commit --quiet
          pre-commit run --all-files

  # ── 2. Build ─────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: ghcr.io/tobiwan88/zephyr_docker:latest
      options: --user zephyr

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: gateway
            board: native_sim
          - app: sensor-node
            board: native_sim

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West init + update
        run: |
          source ~/.venv/bin/activate
          west init -l .
          west update --narrow

      - name: Build ${{ matrix.app }}
        run: |
          source ~/.venv/bin/activate
          west build -p always -b ${{ matrix.board }} apps/${{ matrix.app }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-${{ matrix.board }}
          path: build/zephyr/zephyr.exe
          retention-days: 7

  # ── 3. Test ──────────────────────────────────────────────────────────────
  test:
    name: Twister tests
    runs-on: ubuntu-latest
    needs: build
    container:
      image: ghcr.io/tobiwan88/zephyr_docker:latest
      options: --user zephyr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West init + update
        run: |
          source ~/.venv/bin/activate
          west init -l .
          west update --narrow

      - name: Run Twister
        run: |
          source ~/.venv/bin/activate
          west twister \
            -p native_sim \
            -T tests/ \
            --inline-logs \
            -v \
            -N \
            --output-dir twister-out

      - name: Upload Twister results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twister-results
          path: twister-out/
          retention-days: 14

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Ztest Results
          path: twister-out/**/twister.xml
          reporter: java-junit
          fail-on-error: false
