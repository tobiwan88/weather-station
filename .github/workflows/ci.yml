name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CI_IMAGE: ghcr.io/tobiwan88/zephyr_docker:arm
  VENV: /home/zephyr/.venv/bin/activate

defaults:
  run:
    shell: bash

jobs:
  # ── 1. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tobiwan88/zephyr_docker:arm
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install pre-commit
        run: source /home/zephyr/.venv/bin/activate && pip install pre-commit --quiet

      - name: Run pre-commit hooks
        run: source /home/zephyr/.venv/bin/activate && pre-commit run --all-files

  # ── 2. Build (parallel per app) ─────────────────────────────────────────────
  build:
    name: Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: ghcr.io/tobiwan88/zephyr_docker:arm
      options: --user root

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: gateway
            board: native_sim/native/64
          - app: sensor-node
            board: native_sim/native/64

    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory '*'

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/../zephyr
            ${{ github.workspace }}/../modules
          key: west-${{ hashFiles('west.yml') }}
          restore-keys: west-

      - name: West init + update
        run: |
          source /home/zephyr/.venv/bin/activate
          west init -l . 2>/dev/null || true
          west update --narrow

      - name: Apply out-of-tree patches
        run: |
          source /home/zephyr/.venv/bin/activate
          west patch apply

      - name: Install build dependencies
        run: apt-get update -qq && apt-get install -y --no-install-recommends pkgconf libsdl2-dev

      - name: Build ${{ matrix.app }}
        run: |
          source /home/zephyr/.venv/bin/activate
          WEST_ROOT=$(west topdir)
          # ZEPHYR_EXTRA_MODULES is required: Zephyr CMake does not scan the
          # west manifest's self: project automatically for zephyr/module.yml.
          # Build dir is inside GITHUB_WORKSPACE to keep artifact paths simple.
          ZEPHYR_EXTRA_MODULES="${WEST_ROOT}/weather-station" \
          ZEPHYR_BASE="${WEST_ROOT}/zephyr" \
            west build -p always -b ${{ matrix.board }} \
              --build-dir "${GITHUB_WORKSPACE}/build/${{ matrix.app }}" \
              "${WEST_ROOT}/weather-station/apps/${{ matrix.app }}"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-${{ matrix.board == 'native_sim/native/64' && 'native64' || matrix.board }}
          path: build/${{ matrix.app }}/zephyr/zephyr.exe
          retention-days: 7

  # ── 3. Test + Coverage ───────────────────────────────────────────────────────
  test-and-coverage:
    name: Test + Coverage
    runs-on: ubuntu-latest
    needs: build
    permissions:
      checks: write
      contents: read
    container:
      image: ghcr.io/tobiwan88/zephyr_docker:arm
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory '*'

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/../zephyr
            ${{ github.workspace }}/../modules
          key: west-${{ hashFiles('west.yml') }}
          restore-keys: west-

      - name: West init + update
        run: |
          source /home/zephyr/.venv/bin/activate
          west init -l . 2>/dev/null || true
          west update --narrow

      - name: Apply out-of-tree patches
        run: |
          source /home/zephyr/.venv/bin/activate
          west patch apply

      - name: Install gcovr
        run: source /home/zephyr/.venv/bin/activate && pip install gcovr --quiet

      - name: Run Twister with coverage
        run: |
          source /home/zephyr/.venv/bin/activate
          WEST_ROOT=$(west topdir)
          export ZEPHYR_EXTRA_MODULES="${WEST_ROOT}/weather-station"
          export ZEPHYR_BASE="${WEST_ROOT}/zephyr"
          west twister \
            -p native_sim/native/64 \
            -T "${WEST_ROOT}/weather-station/tests/" \
            --coverage \
            --coverage-tool gcovr \
            --inline-logs \
            -v -N \
            --outdir "${GITHUB_WORKSPACE}/twister-out"

      - name: Generate coverage reports
        if: always()
        run: |
          source /home/zephyr/.venv/bin/activate
          mkdir -p "${GITHUB_WORKSPACE}/twister-out/coverage"
          gcovr \
            --root "${GITHUB_WORKSPACE}/.." \
            --filter ".*/weather-station/.*" \
            --exclude ".*/zephyr/.*" \
            --exclude ".*/modules/.*" \
            --exclude ".*/tests/.*" \
            --html-details "${GITHUB_WORKSPACE}/twister-out/coverage/index.html" \
            --xml "${GITHUB_WORKSPACE}/twister-out/coverage.xml" \
            --print-summary \
            2>/dev/null || true

      - name: Upload Twister results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twister-results
          path: twister-out/
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            twister-out/coverage/
            twister-out/coverage.xml
          retention-days: 14

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Ztest Results
          path: twister-out/**/twister.xml
          reporter: java-junit
          fail-on-error: false

  # ── 4. Docs (Mermaid diagrams) ───────────────────────────────────────────────
  docs:
    name: Docs (render diagrams)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js + mmdc
        run: |
          npm install -g @mermaid-js/mermaid-cli --silent

      - name: Render Mermaid diagrams
        run: |
          # GitHub Actions runners block the Chrome sandbox — pass --no-sandbox.
          echo '{"args":["--no-sandbox","--disable-setuid-sandbox"]}' > /tmp/puppeteer.json
          mkdir -p docs/architecture/diagrams/rendered
          failed=0
          for src in docs/architecture/diagrams/*.mmd; do
            name=$(basename "${src%.mmd}")
            echo "Rendering ${name}..."
            mmdc -i "$src" \
                 -o "docs/architecture/diagrams/rendered/${name}.svg" \
                 --backgroundColor transparent \
                 --puppeteerConfigFile /tmp/puppeteer.json \
                 || { echo "FAILED: $src"; failed=1; }
          done
          exit $failed

      - name: Upload rendered diagrams
        uses: actions/upload-artifact@v4
        with:
          name: rendered-docs
          path: docs/architecture/diagrams/rendered/
          retention-days: 14

  # ── 5. Snapshot (PR only) ────────────────────────────────────────────────────
  snapshot:
    name: Publish PR snapshot
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [build, test-and-coverage, docs]

    steps:
      - name: Download gateway binary
        uses: actions/download-artifact@v4
        with:
          name: gateway-native64
          path: snapshot/binaries/gateway/

      - name: Download sensor-node binary
        uses: actions/download-artifact@v4
        with:
          name: sensor-node-native64
          path: snapshot/binaries/sensor-node/

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: snapshot/coverage/

      - name: Download rendered docs
        uses: actions/download-artifact@v4
        with:
          name: rendered-docs
          path: snapshot/docs/diagrams/

      - name: Download Twister results
        uses: actions/download-artifact@v4
        with:
          name: twister-results
          path: snapshot/twister/

      - name: Upload PR snapshot
        uses: actions/upload-artifact@v4
        with:
          name: pr-snapshot-${{ github.event.pull_request.number }}
          path: snapshot/
          retention-days: 30
