description: |
  Fake temperature sensor for native_sim and testing.

  Each DT node with this compatible is instantiated as an independent
  software sensor driver. The driver subscribes to sensor_trigger_chan
  and publishes env_sensor_data events on sensor_event_chan.

compatible: "fake,temperature"

properties:
  sensor-uid:
    type: int
    required: true
    description: |
      Unique sensor identifier assigned at design time. Must be unique
      across the entire system (both local and remote nodes). Used as
      the identity key in sensor_registry and in env_sensor_data events.

  location:
    type: string
    required: true
    description: |
      Human-readable physical location label, e.g. "living_room",
      "outdoor", "node_0". Used by the sensor registry and display
      consumers.

  initial-value-mdegc:
    type: int
    required: true
    description: |
      Initial temperature value in milli-degrees Celsius (mdeg C).
      For example, 21000 represents 21.000 °C.
      Range: -40000 .. 85000
