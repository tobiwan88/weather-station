# Gateway application configuration
# All features are enabled here; logic lives in libraries.

CONFIG_ZBUS=y
CONFIG_ZBUS_CHANNEL_NAME=y
CONFIG_ZBUS_OBSERVER_NAME=y
CONFIG_ZBUS_RUNTIME_OBSERVERS=y

CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y

CONFIG_LOG=y
#debug for modules
CONFIG_NET_HTTP_SERVER_LOG_LEVEL_DBG=y
CONFIG_HTTP_DASHBOARD_LOG_LEVEL_DBG=y
CONFIG_MQTT_PUBLISHER_LOG_LEVEL_DBG=y

CONFIG_SENSOR_EVENT=y
CONFIG_SENSOR_EVENT_LOG=y
CONFIG_SENSOR_TRIGGER=y
CONFIG_SENSOR_REGISTRY=y
CONFIG_SENSOR_REGISTRY_USER_META=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y
CONFIG_SENSOR_REGISTRY_SETTINGS=y
CONFIG_CONFIG_CMD=y
CONFIG_FAKE_SENSORS=y
CONFIG_FAKE_SENSORS_SHELL=y
CONFIG_FAKE_SENSORS_AUTO_PUBLISH_MS=5000

# Networking via Native Offloaded Sockets (uses host network stack, no TAP)
# Pattern taken from samples/net/sockets/sntp_client/overlay-nsos.conf
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_ETH_NATIVE_TAP=n
CONFIG_NET_DRIVERS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
# ZVFS poll slots: eventfd(1) + listen(1) + max_clients(3) + margin(3) = 8
# Default of 3 is too small; exhaustion leaves stale epoll entries that cause
# EPOLL_CTL_ADD EEXIST on FD reuse → nsi_print_error_and_exit → DUT exits.
CONFIG_ZVFS_POLL_MAX=8
# One context per open socket; HTTP + MQTT + SNTP + remote scan exhaust the
# default of 6.
CONFIG_NET_MAX_CONTEXTS=16
CONFIG_NET_IPV6_DAD=n

# Network debug shell commands
CONFIG_NET_SHELL=y
CONFIG_NET_STATISTICS=y
CONFIG_NET_STATISTICS_USER_API=y
CONFIG_NET_IPV4_AUTO=n
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER_ADDITIONAL_BUF_CTR=2

# SNTP + wall-clock sync
CONFIG_SNTP=y
CONFIG_SNTP_SYNC=y
# Use a numeric IP so SNTP skips DNS resolution, avoiding fd exhaustion when
# the HTTP server + MQTT are concurrently holding sockets on native_sim.
CONFIG_SNTP_SYNC_SERVER="216.239.35.0"
# Short timeout: the devcontainer may not reach external NTP servers.
CONFIG_SNTP_SYNC_TIMEOUT_MS=1000
# Settling delay before each triggered resync: lets any in-flight HTTP socket
# operations complete their NSOS epoll cleanup before SNTP opens a new UDP fd.
CONFIG_SNTP_SYNC_PRESYNC_DELAY_MS=200

# Clock display (HH:MM UTC every minute)
CONFIG_CLOCK_DISPLAY=y

# LVGL graphical display (320x240 SDL window)


# Location registry (auto-selected by HTTP_DASHBOARD, but also enable shell + persistence)
CONFIG_LOCATION_REGISTRY_SETTINGS=y
CONFIG_LOCATION_REGISTRY_SHELL=y

# HTTP dashboard
# Remote sensor transport abstraction + fake stub for native_sim testing
CONFIG_REMOTE_SENSOR=y
CONFIG_REMOTE_SENSOR_SHELL=y
CONFIG_FAKE_REMOTE_SENSOR=y

# MQTT publisher
# Startup delay gives HTTP server time to finish epoll setup before MQTT opens
# a TCP socket (both share the NSOS epoll fd). 100 ms is sufficient on native_sim.
# EPOLL_CTL_MOD on EEXIST handles fd-reuse races in nsos_adapt_poll_add().
CONFIG_MQTT_PUBLISHER_STARTUP_DELAY_MS=100
CONFIG_MQTT_PUBLISHER_SHELL=y
CONFIG_MQTT_LIB=y
CONFIG_MQTT_PUBLISHER=y
CONFIG_MQTT_PUBLISHER_GATEWAY_NAME="weather"
CONFIG_MQTT_PUBLISHER_BROKER_HOST="localhost"
CONFIG_MQTT_PUBLISHER_BROKER_PORT=1883

CONFIG_HTTP_DASHBOARD=y
CONFIG_HTTP_DASHBOARD_PORT=8080
CONFIG_NET_TCP=y
CONFIG_HTTP_SERVER=y
CONFIG_HTTP_PARSER=y
CONFIG_HTTP_PARSER_URL=y
CONFIG_HTTP_SERVER_NUM_SERVICES=1
CONFIG_HTTP_SERVER_MAX_CLIENTS=3
CONFIG_HTTP_SERVER_CLIENT_BUFFER_SIZE=512
CONFIG_HTTP_SERVER_MAX_URL_LENGTH=128

# HTTP dashboard bearer token auth (random 128-bit token generated at boot)
CONFIG_HTTP_DASHBOARD_AUTH=y
CONFIG_HTTP_DASHBOARD_AUTH_SHELL=y
CONFIG_HTTP_DASHBOARD_AUTH_PROTECT_READ=n
# HTTP_SERVER_CAPTURE_HEADERS is auto-selected by HTTP_DASHBOARD_AUTH;
# set the buffer sizes explicitly:
#   "Bearer " (7) + 32 hex chars + NUL = 40 bytes — use 64 for headroom.
CONFIG_HTTP_SERVER_CAPTURE_HEADER_BUFFER_SIZE=64
CONFIG_HTTP_SERVER_CAPTURE_HEADER_COUNT=1
# HTTP_SERVER_MAX_HEADER_LEN is the per-header temporary parse buffer (used
# for both field names and values).  The default of 32 is too small for
# "Bearer <32-hex-token>" (39 chars), which overflows the buffer and causes
# the value to be silently dropped before it can be captured.
CONFIG_HTTP_SERVER_MAX_HEADER_LEN=64


CONFIG_STACK_CANARIES=y
CONFIG_STACK_SENTINEL=y
