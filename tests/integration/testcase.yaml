tests:
  weather_station.integration:
    platform_allow:
      - native_sim/native/64
    harness: pytest
    harness_config:
      pytest_dut_scope: session
      pytest_root:
        - "pytest/"
    tags:
      - integration
      - weather_station
    integration_platforms:
      - native_sim/native/64
    extra_configs:
      - CONFIG_UART_NATIVE_PTY_0_ON_STDINOUT=y
